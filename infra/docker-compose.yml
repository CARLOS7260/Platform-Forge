services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: platformforge
      POSTGRES_USER: platformforge
      POSTGRES_PASSWORD: platformforge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platformforge -d platformforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://platformforge:platformforge@postgres:5432/platformforge
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      INTERNAL_TOKEN: dev-internal-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://platformforge:platformforge@postgres:5432/platformforge
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://api:8000
      INTERNAL_TOKEN: dev-internal-token
    depends_on:
      - api
      - redis

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      API_INTERNAL_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
